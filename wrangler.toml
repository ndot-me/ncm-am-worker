# wrangler.toml — ncm-am-worker
name = "ncm-am-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = []  # Sync is now manual via web UI

# ── KV namespace ──
# 创建: wrangler kv namespace create NCM_AM
# 把输出的 ID 填入下方
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_ID"

# ── Secrets (set via wrangler secret put) ──
# NCM_COOKIE    — 网易云 cookie (MUSIC_U=xxx; __csrf=yyy)
# AM_DEVELOPER_TOKEN — Apple Music JWT
# AM_USER_TOKEN — Apple Music media-user-token
# SYNC_TOKEN    — 同步 API 访问令牌 (用于网页鉴权)
